name: Release linkding-provider and update formula

on:
  push:
    branches:
      - master
    paths:
      - "plugins/linkding-provider/**"

jobs:
  release-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Find the latest linkding-provider tag and increment the patch number
          LATEST=$(git tag --list "linkding-provider-*" --sort=-version:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="linkding-provider-1.0.0"
          else
            # Extract major.minor.patch and bump patch
            VERSION="${LATEST#linkding-provider-}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="linkding-provider-$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          SEMVER="${NEXT#linkding-provider-}"
          echo "tag=$NEXT"       >> $GITHUB_OUTPUT
          echo "semver=$SEMVER"  >> $GITHUB_OUTPUT
          echo "Next tag: $NEXT ($SEMVER)"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Wait for GitHub to make the tarball available
        run: sleep 5

      - name: Compute sha256 of tagged tarball
        id: sha
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          URL="https://github.com/Akinus21/homebrew-tap/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA"   >> $GITHUB_OUTPUT
          echo "url=$URL"      >> $GITHUB_OUTPUT
          echo "sha256: $SHA"
          echo "url: $URL"

      - name: Update formula
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SEMVER="${{ steps.version.outputs.semver }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          sed -i "s|version \".*\"|version \"$SEMVER\"|"   Formula/linkding-provider.rb
          sed -i "s|url \".*\"|url \"$URL\"|"              Formula/linkding-provider.rb
          sed -i "s|sha256 \".*\"|sha256 \"$SHA\"|"        Formula/linkding-provider.rb

          echo "Updated formula:"
          grep -E "version|url|sha256" Formula/linkding-provider.rb

      - name: Commit and push updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add Formula/linkding-provider.rb
          git commit -m "chore: bump linkding-provider to ${{ steps.version.outputs.semver }} [skip ci]"
          git push
